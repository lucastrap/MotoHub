services:
  postgres:
    image: postgres:15-alpine
    container_name: mototrack_db
    environment:
      POSTGRES_USER: mototrack
      POSTGRES_PASSWORD: mototrack_password
      POSTGRES_DB: mototrack_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: mototrack_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
