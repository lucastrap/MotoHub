name: MotoTrack CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: mototrack
          POSTGRES_PASSWORD: mototrack_password
          POSTGRES_DB: mototrack_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Set up environment variables
      run: |
        echo "DATABASE_URL=postgresql://mototrack:mototrack_password@localhost:5432/mototrack_db?schema=public" >> $GITHUB_ENV
        echo "DIRECT_URL=postgresql://mototrack:mototrack_password@localhost:5432/mototrack_db?schema=public" >> $GITHUB_ENV
        echo "JWT_SECRET=test-jwt-secret-for-ci" >> $GITHUB_ENV

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Run Prisma migrations
      run: npx prisma migrate deploy

    - name: Run Linter
      run: npm run lint

    - name: Security audit (dépendances — OWASP A06)
      run: npm audit --audit-level=high
      continue-on-error: true

    - name: Run unit tests
      run: npm run test

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/
        retention-days: 7

    - name: Build
      run: npm run build

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run e2e tests
      run: npm run test:e2e

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Déploiement Vercel — uniquement sur push vers main
  # Prérequis : ajouter dans les GitHub Secrets du repo :
  #   VERCEL_TOKEN       → token API Vercel (Settings > Tokens)
  #   VERCEL_ORG_ID      → depuis .vercel/project.json après `vercel link`
  #   VERCEL_PROJECT_ID  → depuis .vercel/project.json après `vercel link`
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Vercel CLI
      run: npm install -g vercel@latest

    - name: Deploy to Vercel
      run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
