version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mototracker_db
    environment:
      POSTGRES_USER: mototracker
      POSTGRES_PASSWORD: mototracker_password
      POSTGRES_DB: mototracker_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: mototracker_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
